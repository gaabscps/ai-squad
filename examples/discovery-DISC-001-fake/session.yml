squad: "discovery"
feature_name: "Real-time notifications for support tickets"
schema_version: 1

# Artifact references (paths relative to consumer project root)
memo_ref: "./.agent-session/DISC-001/memo.md"

# Time tracking
started_at: "2026-04-15T10:00:00Z"
last_activity_at: "2026-04-15T15:30:00Z"
